name: Albion BM Scanner

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# Нужны права для записи в репо (GitHub Pages)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run BM Scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROFIT_THRESHOLD: ${{ vars.PROFIT_THRESHOLD || '500000' }}
          GIST_ID:          ${{ secrets.GIST_ID }}
          GIST_TOKEN:       ${{ secrets.GIST_TOKEN }}
          LOOP_MODE:        "false"
        run: python albion_bm_scanner_v4.py

      - name: Deploy report to GitHub Pages
        if: always()
        run: |
          git config --global user.name  "Albion Scanner Bot"
          git config --global user.email "scanner@albion.bot"
          git add docs/index.html || true
          git diff --staged --quiet || git commit -m "📊 Scan update $(TZ='Europe/Moscow' date '+%d.%m.%Y %H:%M МСК')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: |
            profit_analysis.csv
            raw_prices.csv
            materials_prices.csv
          retention-days: 3
